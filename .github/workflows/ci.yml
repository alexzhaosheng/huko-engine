# CI — typecheck + test on Linux / macOS / Windows for every push + PR.
# Release workflow is in .github/workflows/release.yml (tag-triggered).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build (dist/)
        # Quick smoke that the publishable build still emits cleanly.
        # The real publish runs in release.yml.
        run: npm run build
